services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: thunderbuddies
      POSTGRES_PASSWORD: thunderbuddies
      POSTGRES_DB: thunder_buddies_ops
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
    environment:
      PORT: 8080
      DATABASE_URL: postgres://thunderbuddies:thunderbuddies@db:5432/thunder_buddies_ops
      ADMIN_TOKEN: change-me-local-admin-token
      ADMIN_USERNAME: owner
      ADMIN_PASSWORD: change-me-local-password
      PUBLIC_BASE_URL: http://localhost:8080
      SERVER_TTL_SECONDS: 300
      ALLOW_PENDING_SERVERS: "true"
    ports:
      - "8080:8080"
    depends_on:
      - db

volumes:
  pgdata:
